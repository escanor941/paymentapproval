{% extends 'base.html' %}
{% set title = 'Reports & Filters' %}
{% block content %}
<div class="card p-3 mb-3">
    <h6>Filters</h6>
    <div class="row g-2 align-items-end">
        <div class="col-md-2"><label class="form-label">From</label><input id="rFrom" type="date" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">To</label><input id="rTo" type="date" class="form-control"></div>
        <div class="col-md-2"><label class="form-label">Vendor</label><select id="rVendor" class="form-select"><option value="">All</option>{% for x in vendors %}<option value="{{x.id}}">{{x.name}}</option>{% endfor %}</select></div>
        <div class="col-md-2"><label class="form-label">Factory</label><select id="rFactory" class="form-select"><option value="">All</option>{% for x in factories %}<option value="{{x.id}}">{{x.name}}</option>{% endfor %}</select></div>
        <div class="col-md-2"><label class="form-label">Status</label><select id="rStatus" class="form-select"><option value="">All</option><option>Draft</option><option>Pending</option><option>Approved</option><option>Rejected</option><option>Hold</option></select></div>
        <div class="col-md-2"><label class="form-label">Payment</label><select id="rPayment" class="form-select"><option value="">All</option><option>Unpaid</option><option>Partially Paid</option><option>Paid</option><option>Hold</option></select></div>
    </div>
    <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-primary" onclick="loadAllReport()">Run</button>
        <button class="btn btn-outline-success" onclick="exportReport('excel')">Export Excel</button>
        <button class="btn btn-outline-danger" onclick="exportReport('pdf')">Export PDF</button>
        <button class="btn btn-outline-secondary" onclick="window.print()">Print</button>
        <button class="btn btn-outline-info" onclick="quickReport('daily')">Daily</button>
        <button class="btn btn-outline-info" onclick="quickReport('weekly')">Weekly</button>
        <button class="btn btn-outline-info" onclick="quickReport('monthly')">Monthly</button>
        <button class="btn btn-outline-info" onclick="quickReport('vendor-wise')">Vendor Wise</button>
        <button class="btn btn-outline-info" onclick="quickReport('item-wise')">Item Wise</button>
        <button class="btn btn-outline-info" onclick="quickReport('factory-wise')">Factory Wise</button>
        <button class="btn btn-outline-info" onclick="quickReport('pending-payment')">Pending Payment</button>
        <button class="btn btn-outline-info" onclick="quickReport('user-wise')">User Wise</button>
        <button class="btn btn-outline-info" onclick="quickReport('rejected')">Rejected</button>
        <button class="btn btn-outline-info" onclick="quickReport('cash-vs-bank')">Cash vs Bank</button>
    </div>
</div>
<div class="card p-3">
    <pre id="reportOutput" class="mb-0 small"></pre>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', path='/js/reports.js') }}"></script>
{% endblock %}
