services:
  - type: web
    name: factory-purchase-approval
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: STORAGE_BACKEND
        value: "r2"
      - key: UPLOAD_DIR
        value: "uploads"
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: "auto"
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false

# Optional persistent disk setup (recommended for local file uploads):
# disks:
#   - name: uploads-disk
#     mountPath: /var/data
#     sizeGB: 5
